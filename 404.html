<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bluewave · 404 - Page Not Found</title>
  <!-- Google Fonts + Font Awesome 6 (clean, minimal style) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ----- fresh aquatic theme (light, airy, ocean inspired) ----- */
    :root {
      --bg-gradient-start: #e6f7f5;
      --bg-gradient-end: #d9f0ef;
      --blob-light: rgba(108, 192, 186, 0.2);
      --blob-secondary: rgba(80, 170, 164, 0.15);
      --card-bg: rgba(255, 255, 255, 0.98);
      --card-border: rgba(108, 192, 186, 0.4);
      --text-primary: #1b3b3a;
      --text-soft: #2b6b66;
      --logo-icon: #6CC0BA;
      --logo-gradient-start: #6CC0BA;
      --logo-gradient-end: #3d958e;
      --hint-bg: rgba(108, 192, 186, 0.12);
      --link-color: #2b8b84;
      --link-hover: #1e6b66;
    }

    body {
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      position: relative;
    }

    /* animated background blobs (soft, calm motion) */
    .shape-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .shape-bg::before,
    .shape-bg::after,
    .blob-1,
    .blob-2 {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(85px);
      z-index: 0;
    }

    .shape-bg::before {
      width: 68vw;
      height: 68vw;
      background: var(--blob-light);
      top: -20vh;
      left: -15vw;
      opacity: 0.6;
    }

    .shape-bg::after {
      width: 58vw;
      height: 58vw;
      background: var(--blob-secondary);
      bottom: -15vh;
      right: -12vw;
      opacity: 0.5;
    }

    .blob-1 {
      width: 52vw;
      height: 52vw;
      background: var(--blob-secondary);
      bottom: 5%;
      left: 2%;
      opacity: 0.4;
    }

    .blob-2 {
      width: 55vw;
      height: 55vw;
      background: var(--blob-secondary);
      top: -8%;
      right: -5%;
      opacity: 0.35;
    }

    /* main error card - clean, centered, no buttons */
    .error-card {
      background-color: var(--card-bg);
      backdrop-filter: blur(2px);
      border-radius: 1.8rem;
      width: 100%;
      max-width: 440px;
      padding: 1.5rem 1.8rem 2rem;
      box-shadow: 0 25px 40px -18px rgba(0, 32, 30, 0.25), 0 4px 14px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--card-border);
      position: relative;
      z-index: 12;
      text-align: center;
      transition: all 0.2s ease;
    }

    /* brand section (logo + tagline) */
    .brand-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
    }
    
    .logo i {
      font-size: 2rem;
      color: var(--logo-icon);
      display: inline-block;
    }
    
    .logo span {
      background: linear-gradient(135deg, var(--logo-gradient-start), var(--logo-gradient-end));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    
    .service-subtitle {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.25px;
      color: var(--text-soft);
      background: var(--hint-bg);
      display: inline-block;
      padding: 0.2rem 0.9rem;
      border-radius: 30px;
      margin-top: 0.5rem;
      backdrop-filter: blur(2px);
    }

    /* 404 specific hero content - no buttons */
    .error-hero {
      margin: 0.5rem 0 0.8rem;
    }

    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--text-soft), #6CC0BA);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -3px;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-code i {
      font-size: 3.8rem;
      color: var(--logo-icon);
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      color: var(--logo-icon);
      margin: 0 0.1rem;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0.4rem 0 0.3rem;
      color: var(--text-primary);
      letter-spacing: -0.2px;
    }

    .error-desc {
      font-size: 0.85rem;
      color: var(--text-soft);
      max-width: 280px;
      margin: 0.5rem auto 0.2rem;
      line-height: 1.45;
    }

    /* simple home link — clean inline, no button styles */
    .return-link {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--link-color);
      text-decoration: none;
      border-bottom: 1px dashed rgba(108, 192, 186, 0.5);
      transition: all 0.2s ease;
      letter-spacing: 0.2px;
    }

    .return-link i {
      font-size: 0.75rem;
      margin-right: 6px;
      transition: transform 0.2s ease;
    }

    .return-link:hover {
      color: var(--link-hover);
      border-bottom-color: var(--link-hover);
    }

    .return-link:hover i {
      transform: translateX(-3px);
    }

    /* extra spacing & subtle divider for breathing */
    .gentle-space {
      margin: 0.6rem 0 0;
    }

    /* no buttons, no interactive toggles, no extra panels */
    @media (max-width: 480px) {
      .error-card {
        max-width: 92%;
        padding: 1.2rem 1.2rem 1.6rem;
      }
      .error-code {
        font-size: 3.8rem;
      }
      .error-code i {
        font-size: 2.8rem;
      }
      .error-title {
        font-size: 1.2rem;
      }
      .error-desc {
        font-size: 0.78rem;
        max-width: 240px;
      }
      .return-link {
        font-size: 0.8rem;
      }
    }

    @media (max-height: 640px) {
      .error-card {
        padding: 1rem 1.2rem 1.2rem;
      }
      .error-code {
        font-size: 3.6rem;
      }
      .error-code i {
        font-size: 2.5rem;
      }
      .error-title {
        font-size: 1.1rem;
      }
      .brand-logo {
        margin-bottom: 0.3rem;
      }
      .return-link {
        margin-top: 1rem;
      }
    }

    /* clean focus outline for accessibility */
    .return-link:focus-visible {
      outline: 2px solid #6CC0BA;
      outline-offset: 3px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <!-- background animated blobs (purely decorative) -->
  <div class="shape-bg"></div>
  <div class="blob-1"></div>
  <div class="blob-2"></div>

  <!-- main card: pure 404 message, no buttons or control elements -->
  <div class="error-card">
    <!-- brand logo (Bluewave identity) -->
    <div class="brand-logo">
      <div class="logo">
        <i class="fas fa-droplet"></i>
        <span>Bluewave</span>
      </div>
      <div class="service-subtitle">
        <i class="fas fa-chlorine"></i> Mobile Pool Cleaning & Chemical Balancing
      </div>
    </div>

    <!-- 404 error content — classic, calm and clear -->
    <div class="error-hero">
      <div class="error-code">
        4<i class="fas fa-water"></i>4
      </div>
      <div class="error-title">
        Page not found
      </div>
      <div class="error-desc">
        The page you're looking for doesn't exist, has been moved, or never made a splash.
      </div>
    </div>

    <!-- only a clean text link (NOT a button): subtle way to return home -->
    <div class="gentle-space">
      <a href="/" class="return-link">
        <i class="fas fa-arrow-left"></i> Return to Bluewave Home
      </a>
    </div>
    <!-- no buttons, no demo hints, no contact/report panels, no toggles -->
  </div>
</body>
</html>
